
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="title" content="Build A Boat (Phase 1)">
  <meta name="description" content="Roblox-style Build A Boat prototype with shop, inventory, building, and sailing. Made with Three.js.">
  <meta name="owner" content="Roblox Enthusiast">
  <meta property="og:title" content="Build A Boat (Phase 1)">
  <meta property="og:description" content="Roblox-style Build A Boat prototype with shop, inventory, building, and sailing. Made with Three.js.">
  <meta name="twitter:title" content="Build A Boat (Phase 1)">
  <meta name="twitter:description" content="Roblox-style Build A Boat prototype with shop, inventory, building, and sailing. Made with Three.js.">
  <title>Build A Boat</title>
  <style>
    :root{
      --joy-size: 130px;
      --accent: #ffd966;
      --panel-bg: rgba(22,24,34,0.95);
      --panel-border: rgba(255,255,255,0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    /* ============ Roblox-style joystick - bottom left ============ */
    #joystick-area {
      position: absolute;
      bottom: 40px;
      left: 40px;
      width: var(--joy-size);
      height: var(--joy-size);
      border-radius: 50%;
      background: rgba(30, 30, 40, 0.7);
      backdrop-filter: blur(8px);
      border: 2px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
      touch-action: none;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #joystick-knob {
      width: calc(var(--joy-size) * 0.46);
      height: calc(var(--joy-size) * 0.46);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #f0f4ff, #b0c4ff);
      box-shadow: 0 4px 14px rgba(0,0,0,0.6);
      transition: box-shadow 0.1s;
      touch-action: none;
      pointer-events: none;
      border: 2px solid rgba(255,255,255,0.5);
      position: relative;
      left: 0;
      top: 0;
    }
    /* ============ Jump button - bottom right ============ */
    #jump-btn {
      position: absolute;
      bottom: 50px;
      right: 40px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #ffd966, #f0a030);
      border: 3px solid rgba(255, 215, 100, 0.8);
      box-shadow: 0 8px 0 #b06a1a, 0 10px 25px rgba(0,0,0,0.5);
      color: #2d1f00;
      font-size: 22px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      text-shadow: 0 1px 2px rgba(255,255,200,0.6);
      touch-action: none;
      z-index: 20;
      cursor: pointer;
      transition: all 0.05s ease;
      letter-spacing: 1px;
      user-select: none;
      -webkit-user-select: none;
    }
    #jump-btn:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #b06a1a, 0 8px 20px rgba(0,0,0,0.5);
    }
    #status {
      position: absolute;
      top: 20px;
      right: 20px;
      color: #fff;
      background: rgba(0,0,0,0.5);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.1);
      pointer-events: none;
      z-index: 10;
      font-family: monospace;
    }
    @media (max-width: 600px) {
      #joystick-area { width: calc(var(--joy-size) * 0.85); height: calc(var(--joy-size) * 0.85); bottom: 30px; left: 24px; }
      #jump-btn { width: 70px; height: 70px; bottom: 34px; right: 24px; font-size: 18px; }
    }

    /* ============ Roblox-chunky button system ============ */
    .pill-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      font-family: 'Segoe UI', Tahoma, sans-serif; font-weight: 800; letter-spacing: .3px;
      border: 2px solid rgba(255,255,255,0.35); border-radius: 14px;
      cursor: pointer; user-select: none; -webkit-user-select: none;
      transition: transform .05s ease, box-shadow .05s ease;
      color: #1c1400; text-shadow: 0 1px 1px rgba(255,255,255,0.35);
    }
    .pill-btn:active { transform: translateY(4px); }
    .pill-green { background: linear-gradient(180deg,#7CFC7C,#3fae3f); box-shadow: 0 5px 0 #237a23, 0 8px 18px rgba(0,0,0,.4); color:#0d2b0d; }
    .pill-green:active { box-shadow: 0 1px 0 #237a23, 0 4px 10px rgba(0,0,0,.4); }
    .pill-blue { background: linear-gradient(180deg,#8fc3ff,#3c7fd6); box-shadow: 0 5px 0 #21508f, 0 8px 18px rgba(0,0,0,.4); color:#0d1f38; }
    .pill-blue:active { box-shadow: 0 1px 0 #21508f, 0 4px 10px rgba(0,0,0,.4); }
    .pill-gray { background: linear-gradient(180deg,#e4e7ee,#a9afba); box-shadow: 0 5px 0 #6b707a, 0 8px 18px rgba(0,0,0,.4); color:#20242b; }
    .pill-gray:active { box-shadow: 0 1px 0 #6b707a, 0 4px 10px rgba(0,0,0,.4); }
    .pill-gold { background: linear-gradient(180deg,#ffe58a,#e8ab2c); box-shadow: 0 5px 0 #a5701a, 0 8px 18px rgba(0,0,0,.4); color:#2d1f00; }
    .pill-red { background: linear-gradient(180deg,#ff9a9a,#d6453c); box-shadow: 0 5px 0 #8f2621, 0 8px 18px rgba(0,0,0,.4); color:#380d0d; }

    /* ============ Top bar ============ */
    #topbar-left { position:absolute; top:16px; left:16px; z-index:25; display:flex; gap:8px; }
    #topbar-right { position:absolute; top:16px; right:16px; z-index:25; display:flex; gap:8px; align-items:center; flex-wrap: wrap; justify-content: flex-end; max-width: 62vw; }
    #launch-btn { padding: 12px 22px; font-size: 16px; }
    .top-icon-btn { width:44px; height:44px; padding:0; border-radius:12px; font-size:18px; }
    .badge-pill {
      display:flex; align-items:center; gap:6px; background: rgba(15,16,24,0.75); backdrop-filter: blur(6px);
      border: 2px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 8px 12px;
      color: #fff; font-weight:700; font-size: 13px; font-family: monospace;
    }
    #money-badge .amt { color: #7CFC7C; }
    #fps-badge .amt { color: #8fc3ff; }

    /* ============ Left toolbar ============ */
    #toolbar {
      position:absolute; left:16px; top:50%; transform:translateY(-50%);
      z-index:25; display:flex; flex-direction:column; gap:8px;
      transition: transform .2s ease, opacity .2s ease;
    }
    #toolbar.collapsed { transform: translateY(-50%) translateX(-70px); opacity: 0; pointer-events:none; }
    .tool-btn {
      width:52px; height:52px; border-radius:14px; font-size:20px; flex-direction:column; font-size:10px; gap:2px;
    }
    .tool-btn.active-mode { outline: 3px solid #fff; }
    .tool-icon { font-size: 18px; }

    /* ============ Generic modal / panel ============ */
    .overlay {
      position: absolute; inset:0; background: rgba(0,0,0,0.45);
      display:none; align-items:center; justify-content:center; z-index:60;
    }
    .overlay.open { display:flex; }
    .panel {
      background: var(--panel-bg); border: 2px solid var(--panel-border); border-radius: 18px;
      width: min(94vw, 480px); max-height: 82vh; display:flex; flex-direction:column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6); color:#fff; overflow:hidden;
    }
    .panel-header {
      display:flex; align-items:center; justify-content:space-between; padding: 14px 18px;
      border-bottom: 1px solid var(--panel-border); font-weight:800; font-size:16px; letter-spacing:.3px;
    }
    .panel-close { cursor:pointer; width:30px; height:30px; border-radius:8px; background:rgba(255,255,255,0.08);
      display:flex; align-items:center; justify-content:center; font-size:16px; border:1px solid var(--panel-border); }
    .panel-body { padding: 14px 18px; overflow-y:auto; flex:1; }
    .tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
    .tab-btn {
      background: rgba(255,255,255,0.06); border:1px solid var(--panel-border); color:#cfd3dc;
      padding:6px 10px; border-radius:9px; font-size:12px; font-weight:700; cursor:pointer;
    }
    .tab-btn.active { background: var(--accent); color:#2d1f00; border-color: var(--accent); }
    .search-input {
      width:100%; padding:9px 12px; border-radius:10px; border:1px solid var(--panel-border);
      background: rgba(255,255,255,0.06); color:#fff; font-size:13px; margin-bottom:10px;
    }
    .item-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(92px,1fr)); gap:10px; }
    .item-card {
      background: rgba(255,255,255,0.05); border:1px solid var(--panel-border); border-radius:12px;
      padding:8px; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer;
      position:relative; text-align:center;
    }
    .item-card.locked { opacity:0.45; }
    .item-card .swatch { width:38px; height:38px; border-radius:9px; border:2px solid rgba(255,255,255,0.25); }
    .item-card .iname { font-size:10.5px; font-weight:700; line-height:1.15; }
    .item-card .iprice { font-size:10px; color:#ffd966; font-weight:700; }
    .item-card .iqty { position:absolute; top:4px; right:4px; background:#000; border-radius:8px; font-size:9px; padding:1px 5px; }
    .fav-star { position:absolute; top:4px; left:4px; font-size:12px; cursor:pointer; }
    .fav-star.on { color: #ffd966; }
    .fav-star.off { color: #666; }

    .settings-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--panel-border); gap:10px; }
    .settings-row label { font-size:13px; font-weight:600; flex:1; }
    .settings-row input[type=range] { flex:1; max-width: 140px; }
    .more-list { display:flex; flex-direction:column; gap:8px; }
    .more-list button { text-align:left; padding:12px 14px; font-size:14px; justify-content:flex-start; }

    /* ============ More dropdown ============ */
    #more-dropdown {
      position:absolute; top:66px; right:16px; z-index:40; display:none; flex-direction:column; gap:6px;
      background: var(--panel-bg); border:2px solid var(--panel-border); border-radius:14px; padding:10px; min-width:180px;
    }
    #more-dropdown.open { display:flex; }
    #more-dropdown button { text-align:left; padding:9px 12px; font-size:13px; justify-content:flex-start; }

    /* ============ Build HUD ============ */
    #build-hud {
      position:absolute; bottom:150px; left:50%; transform:translateX(-50%);
      z-index:30; display:none; gap:8px; background: var(--panel-bg); border:2px solid var(--panel-border);
      border-radius: 16px; padding:10px; flex-wrap:wrap; justify-content:center; max-width:92vw;
    }
    #build-hud.open { display:flex; }
    #build-hud button { padding:9px 12px; font-size:12px; }

    /* ============ Floating small panels (paint/hammer/screw) ============ */
    .float-panel {
      position:absolute; bottom:150px; left:50%; transform:translateX(-50%);
      z-index:31; display:none; background: var(--panel-bg); border:2px solid var(--panel-border);
      border-radius:16px; padding:12px; max-width:92vw; color:#fff;
    }
    .float-panel.open { display:block; }
    .swatch-row { display:flex; gap:6px; flex-wrap:wrap; margin:8px 0; }
    .color-swatch { width:28px; height:28px; border-radius:8px; border:2px solid rgba(255,255,255,0.3); cursor:pointer; }
    .mat-select { padding:6px 8px; border-radius:8px; background:rgba(255,255,255,0.08); color:#fff; border:1px solid var(--panel-border); }

    /* ============ Toast ============ */
    #toast-container { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); z-index:80; display:flex; flex-direction:column; gap:6px; align-items:center; }
    .toast {
      background: rgba(20,20,28,0.92); border:2px solid var(--panel-border); color:#fff; padding:10px 18px;
      border-radius: 12px; font-size:13px; font-weight:700; box-shadow:0 8px 20px rgba(0,0,0,.5);
      animation: toast-in .18s ease, toast-out .3s ease 2.4s forwards;
    }
    .toast.warn { border-color:#d6453c; color:#ffb3ad; }
    .toast.success { border-color:#3fae3f; color:#bdf5bd; }
    @keyframes toast-in { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
    @keyframes toast-out { from{opacity:1;} to{opacity:0; transform:translateY(-6px);} }

    #warning-banner {
      position:absolute; top:70px; left:50%; transform:translateX(-50%); z-index:26;
      background: rgba(214,69,60,0.9); color:#fff; padding:8px 16px; border-radius:10px; font-weight:800; font-size:13px;
      display:none;
    }
  </style>
</head>
<body>
  <!-- Joystick -->
  <div id="joystick-area">
    <div id="joystick-knob"></div>
  </div>

  <!-- Jump button -->
  <div id="jump-btn">JUMP</div>

  <!-- Status indicator -->
  <div id="status">⏳ Checking for player.glb...</div>

  <!-- ============ Top bar ============ -->
  <div id="topbar-left">
    <button id="launch-btn" class="pill-btn pill-green">🚤 LAUNCH</button>
  </div>
  <div id="topbar-right">
    <div id="money-badge" class="badge-pill">💰 <span class="amt" id="money-amt">0</span></div>
    <div id="fps-badge" class="badge-pill">⚡ <span class="amt" id="fps-amt">60</span></div>
    <button id="shop-btn" class="pill-btn pill-gold" style="padding:10px 16px;font-size:14px;">🛒 Shop</button>
    <button id="more-btn" class="pill-btn pill-gray" style="padding:10px 16px;font-size:14px;">☰ More</button>
  </div>
  <div id="warning-banner"></div>

  <!-- ============ More dropdown ============ -->
  <div id="more-dropdown">
    <button class="pill-btn pill-gray" data-action="quests">📜 Quests</button>
    <button class="pill-btn pill-gray" data-action="settings">⚙️ Settings</button>
    <button class="pill-btn pill-gray" data-action="save">💾 Save</button>
    <button class="pill-btn pill-gray" data-action="load">📂 Load</button>
    <button class="pill-btn pill-gray" data-action="controls">🎮 Controls</button>
    <button class="pill-btn pill-gray" data-action="credits">✨ Credits</button>
    <button class="pill-btn pill-red" data-action="resetboat">🔨 Reset Boat</button>
    <button class="pill-btn pill-blue" data-action="respawn">🔁 Respawn</button>
  </div>

  <!-- ============ Left toolbar ============ -->
  <div id="toolbar">
    <button class="pill-btn pill-blue tool-btn" data-mode="build"><span class="tool-icon">🧱</span>Build</button>
    <button class="pill-btn pill-red tool-btn" data-mode="delete"><span class="tool-icon">🗑️</span>Delete</button>
    <button class="pill-btn pill-gray tool-btn" data-mode="move"><span class="tool-icon">✋</span>Move</button>
    <button class="pill-btn pill-gold tool-btn" data-mode="paint"><span class="tool-icon">🎨</span>Paint</button>
    <button class="pill-btn pill-gray tool-btn" data-mode="tools"><span class="tool-icon">🔧</span>Tools</button>
    <button class="pill-btn pill-green tool-btn" data-mode="inventory"><span class="tool-icon">🎒</span>Inv</button>
    <button id="collapse-btn" class="pill-btn pill-gray tool-btn"><span class="tool-icon">«</span></button>
  </div>

  <!-- ============ Build HUD ============ -->
  <div id="build-hud">
    <button class="pill-btn pill-green" id="build-place">✅ Place</button>
    <button class="pill-btn pill-blue" id="build-rotate">🔄 Rotate (90°)</button>
    <button class="pill-btn pill-gray" id="build-mirror">🪞 Mirror</button>
    <button class="pill-btn pill-gold" id="build-anchor">⚓ Anchor: ON</button>
    <button class="pill-btn pill-red" id="build-cancel">✖ Cancel</button>
  </div>

  <!-- ============ Tools sub-bar ============ -->
  <div id="tools-hud" class="float-panel">
    <div style="font-weight:800;margin-bottom:8px;">Tools</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="pill-btn pill-gray" id="tool-screw">🔩 Screw (Resize)</button>
      <button class="pill-btn pill-gray" id="tool-hammer">🔨 Hammer (Edit)</button>
      <button class="pill-btn pill-gray" id="tool-repair">🩹 Repair / Wrench</button>
    </div>
    <div style="font-size:11px;color:#aaa;margin-top:8px;">Tap a block on the boat after choosing a tool.</div>
  </div>

  <!-- ============ Paint palette ============ -->
  <div id="paint-panel" class="float-panel">
    <div style="font-weight:800;margin-bottom:4px;">Paint — tap a block</div>
    <div class="swatch-row" id="paint-swatches"></div>
    <select class="mat-select" id="paint-material">
      <option value="default">Default</option>
      <option value="wood">Wood</option>
      <option value="metal">Metal</option>
      <option value="plastic">Plastic</option>
      <option value="glass">Glass</option>
      <option value="neon">Neon</option>
      <option value="glow">Glow</option>
    </select>
  </div>

  <!-- ============ Screw panel ============ -->
  <div id="screw-panel" class="float-panel">
    <div style="font-weight:800;margin-bottom:8px;">Screw Tool — Resize</div>
    <div style="display:flex;align-items:center;gap:10px;">
      <input type="range" id="screw-slider" min="0.4" max="2.2" step="0.05" value="1">
      <span id="screw-val">1.00x</span>
    </div>
    <div style="font-size:11px;color:#aaa;margin-top:6px;">Tap a block, then drag the slider.</div>
  </div>

  <!-- ============ Hammer panel ============ -->
  <div id="hammer-panel" class="float-panel">
    <div style="font-weight:800;margin-bottom:8px;">Hammer Tool</div>
    <div class="settings-row"><label>Anchored</label><button class="pill-btn pill-gray" id="hammer-anchor-toggle" style="padding:6px 10px;font-size:11px;">ON</button></div>
    <div class="settings-row"><label>Transparency</label><input type="range" id="hammer-transparency" min="0" max="1" step="0.05" value="1"></div>
    <div class="settings-row"><label>Motor Speed</label><input type="range" id="hammer-motor" min="-5" max="5" step="0.5" value="0"></div>
    <div class="settings-row"><label>Motor Direction</label><button class="pill-btn pill-gray" id="hammer-dir-toggle" style="padding:6px 10px;font-size:11px;">CW</button></div>
    <div class="settings-row"><label>Mass</label><input type="range" id="hammer-mass" min="1" max="20" step="1" value="5"></div>
    <div class="settings-row"><label>Collision</label><button class="pill-btn pill-gray" id="hammer-collision-toggle" style="padding:6px 10px;font-size:11px;">ON</button></div>
    <div style="font-size:11px;color:#aaa;margin-top:4px;">Tap a block first to edit it.</div>
  </div>

  <!-- ============ Shop overlay ============ -->
  <div id="shop-overlay" class="overlay">
    <div class="panel">
      <div class="panel-header">🛒 Shop <div class="panel-close" data-close="shop-overlay">✖</div></div>
      <div class="panel-body">
        <input class="search-input" id="shop-search" placeholder="Search items...">
        <div class="tabs" id="shop-tabs"></div>
        <div class="item-grid" id="shop-grid"></div>
      </div>
    </div>
  </div>

  <!-- ============ Inventory overlay ============ -->
  <div id="inventory-overlay" class="overlay">
    <div class="panel">
      <div class="panel-header">🎒 Inventory <div class="panel-close" data-close="inventory-overlay">✖</div></div>
      <div class="panel-body">
        <input class="search-input" id="inv-search" placeholder="Search items...">
        <div class="tabs" id="inv-tabs"></div>
        <div class="item-grid" id="inv-grid"></div>
      </div>
    </div>
  </div>

  <!-- ============ Settings overlay ============ -->
  <div id="settings-overlay" class="overlay">
    <div class="panel">
      <div class="panel-header">⚙️ Settings <div class="panel-close" data-close="settings-overlay">✖</div></div>
      <div class="panel-body" id="settings-body"></div>
    </div>
  </div>

  <!-- ============ Quests overlay ============ -->
  <div id="quests-overlay" class="overlay">
    <div class="panel">
      <div class="panel-header">📜 Quests <div class="panel-close" data-close="quests-overlay">✖</div></div>
      <div class="panel-body" id="quests-body"></div>
    </div>
  </div>

  <!-- ============ Controls overlay ============ -->
  <div id="controls-overlay" class="overlay">
    <div class="panel">
      <div class="panel-header">🎮 Controls <div class="panel-close" data-close="controls-overlay">✖</div></div>
      <div class="panel-body" id="controls-body"></div>
    </div>
  </div>

  <!-- ============ Credits overlay ============ -->
  <div id="credits-overlay" class="overlay">
    <div class="panel">
      <div class="panel-header">✨ Credits <div class="panel-close" data-close="credits-overlay">✖</div></div>
      <div class="panel-body" id="credits-body"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <!-- Three.js -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.126.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.126.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">

    import * as THREE from 'three';
    import { OrbitControls } from 'https://unpkg.com/three@0.126.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.126.0/examples/jsm/loaders/GLTFLoader.js';
    
    //----------icons---------
    // Icon replacement function
function replaceEmojisWithIcons() {

    function getJoystickOffset(clientX, clientY) {
      const rect = joystickArea.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      let dx = clientX - cx;
      let dy = clientY - cy;
      const maxR = rect.width / 2 - 10;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > maxR) {
        dx = (dx / dist) * maxR;
        dy = (dy / dist) * maxR;
      }
      return { dx, dy, maxR };
    }

    function updateJoystick(clientX, clientY) {
      const { dx, dy, maxR } = getJoystickOffset(clientX, clientY);
      knob.style.transform = `translate(${dx}px, ${dy}px)`;
      const normX = dx / maxR;
      const normY = dy / maxR;
      const deadzone = 0.12;
      joystickData.x = Math.abs(normX) < deadzone ? 0 : (Math.sign(normX) * (Math.abs(normX) - deadzone) / (1 - deadzone));
      joystickData.y = Math.abs(normY) < deadzone ? 0 : (Math.sign(normY) * (Math.abs(normY) - deadzone) / (1 - deadzone));
      joystickData.x = Math.min(1, Math.max(-1, joystickData.x));
      joystickData.y = Math.min(1, Math.max(-1, joystickData.y));
    }

// Obstacle system
const obstacles = [];
const obstacleTypes = ['rock', 'island', 'iceberg'];

function createObstacle(type, x, z) {
  const group = new THREE.Group();
  let mesh;
  
  if (type === 'rock') {
    mesh = new THREE.Mesh(
      new THREE.DodecahedronGeometry(0.5 + Math.random() * 0.8, 1),
      new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9 })
    );
    mesh.position.y = 0.3;
    group.add(mesh);
  } else if (type === 'island') {
    const base = new THREE.Mesh(
      new THREE.CylinderGeometry(1.2 + Math.random() * 1.0, 1.8 + Math.random() * 1.2, 0.3 + Math.random() * 0.3, 8),
      new THREE.MeshStandardMaterial({ color: 0x8B7D6B, roughness: 1 })
    );
    base.position.y = 0.15;
    group.add(base);
    const green = new THREE.Mesh(
      new THREE.CylinderGeometry(0.8 + Math.random() * 0.5, 0.6 + Math.random() * 0.4, 0.15 + Math.random() * 0.15, 6),
      new THREE.MeshStandardMaterial({ color: 0x4CAF50, roughness: 0.8 })
    );
    green.position.y = 0.35;
    group.add(green);
  } else if (type === 'iceberg') {
    mesh = new THREE.Mesh(
      new THREE.ConeGeometry(0.8 + Math.random() * 0.6, 0.8 + Math.random() * 0.5, 6),
      new THREE.MeshStandardMaterial({ color: 0xADD8E6, roughness: 0.3, metalness: 0.1, transparent: true, opacity: 0.8 })
    );
    mesh.position.y = 0.4;
    group.add(mesh);
  }
  
  group.position.set(x, 0, z);
  group.rotation.y = Math.random() * Math.PI * 2;
  scene.add(group);
  obstacles.push({ group, type, x, z, radius: 0.8 + Math.random() * 0.5 });
  return group;
}

function generateObstacles() {
  // Clear old obstacles
  obstacles.forEach(o => scene.remove(o.group));
  obstacles.length = 0;
  
  // Generate obstacles in a ring around spawn
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const distance = 15 + Math.random() * 60;
    const x = Math.cos(angle) * distance;
    const z = Math.sin(angle) * distance;
    const type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
    createObstacle(type, x, z);
  }
}

    function saveGame(showMsg) {
      try {
        const data = {
          money: Game.money,
          inventory: Game.inventory,
          ownedTools: Game.ownedTools,
          favorites: Game.favorites,
          settings: Game.settings,
          firstLoad: false,

            ry: b.mesh.rotation.y, sx: b.mesh.scale.x, sy: b.mesh.scale.y, sz: b.mesh.scale.z,
            motorSpeed: b.motorSpeed, motorDir: b.motorDir, transparency: b.transparency,
            mass: b.mass, collision: b.collision, colorOverride: b.colorOverride, materialOverride: b.materialOverride
          }))
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        if (showMsg) showToast('Game saved!', 'success');
      } catch (e) {

    function clearBoat(returnToInventory) {
      Game.placedBlocks.forEach(b => {
        if (b.mesh.parent) b.mesh.parent.remove(b.mesh);
        if (returnToInventory) Game.inventory[b.itemId] = (Game.inventory[b.itemId] || 0) + 1;
      });
      Game.placedBlocks = [];
    }

    function loadGame(showMsg) {
      let raw = null;
      try { raw = localStorage.getItem(STORAGE_KEY); } catch (e) { raw = null; }
      if (!raw) {
        grantStarterKit();
        if (showMsg) showToast('No save found — starter kit granted', 'warn');
        return;
      }
      try {
        const data = JSON.parse(raw);
        Game.money = typeof data.money === 'number' ? data.money : 300;
        Game.inventory = data.inventory || {};
        Game.ownedTools = data.ownedTools || {};
        Game.favorites = data.favorites || {};
        Game.settings = Object.assign({}, DEFAULT_SETTINGS, data.settings || {});
        Game.firstLoad = false;
        clearBoat(false);
        (data.blocks || []).forEach(bd => {
          const catalogItem = ITEM_BY_ID[bd.itemId];
          if (!catalogItem) return;
          const mesh = createItemMesh(catalogItem);
          mesh.position.set(bd.px, bd.py, bd.pz);
          mesh.rotation.y = bd.ry || 0;
          mesh.scale.set(bd.sx || 1, bd.sy || 1, bd.sz || 1);
          const entry = {
            uid: bd.uid || Game.uidCounter++, itemId: bd.itemId, mesh,
            anchored: bd.anchored !== false, motorSpeed: bd.motorSpeed || 0, motorDir: bd.motorDir || 1,
            transparency: bd.transparency != null ? bd.transparency : 1, mass: bd.mass || 5,
            collision: bd.collision !== false, colorOverride: bd.colorOverride || null,
            materialOverride: bd.materialOverride || null, vy: 0, resting: true
          };
          applyBlockVisuals(entry);
          if (entry.anchored) boatGroup.add(mesh); else scene.add(mesh);
          Game.placedBlocks.push(entry);
        });
        applySettingsToEngine();
        if (showMsg) showToast('Game loaded!', 'success');

    // --- simple procedural audio (no external files needed) ---
    let audioCtx = null;
    function ensureAudio() {
      if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { audioCtx = null; }
      }
      return audioCtx;
    }
    function playSfx(kind) {
      const ctx = ensureAudio();
      if (!ctx || Game.settings.sfxVolume <= 0) return;
      const freqs = { click:520, buy:660, place:440, delete:220, jump:740, error:180, launch:330, splash:200, portal:880 };
      const freq = freqs[kind] || 440;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = kind === 'error' ? 'sawtooth' : 'sine';
      osc.frequency.value = freq;
      gain.gain.value = 0.0001;
      osc.connect(gain); gain.connect(ctx.destination);
      const now = ctx.currentTime;
      gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, Game.settings.sfxVolume * 0.35), now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
      osc.start(now); osc.stop(now + 0.24);
    }
    let musicOsc = null, musicGain = null;
    function startMusic() {
      const ctx = ensureAudio();
      if (!ctx || musicOsc) return;
      musicGain = ctx.createGain();
      musicGain.gain.value = Game.settings.musicVolume * 0.06;
      musicOsc = ctx.createOscillator();
      musicOsc.type = 'sine';
      musicOsc.frequency.value = 196;
      const lfo = ctx.createOscillator();
      lfo.frequency.value = 0.08;
      const lfoGain = ctx.createGain();
      lfoGain.gain.value = 20;
      lfo.connect(lfoGain); lfoGain.connect(musicOsc.frequency);
      musicOsc.connect(musicGain); musicGain.connect(ctx.destination);
      musicOsc.start(); lfo.start();
    }
    document.addEventListener('pointerdown', function initAudioOnce() {
      ensureAudio(); startMusic();
      document.removeEventListener('pointerdown', initAudioOnce);
    }, { once: true });

    // --- mesh creation from catalog item ---
    const MATERIAL_PRESETS = {
      default: { roughness: 0.6, metalness: 0.1, transparent: false, opacity: 1, emissiveIntensity: 0 },
      wood: { roughness: 0.85, metalness: 0.0, transparent: false, opacity: 1, emissiveIntensity: 0 },
      metal: { roughness: 0.3, metalness: 0.85, transparent: false, opacity: 1, emissiveIntensity: 0 },
      plastic: { roughness: 0.45, metalness: 0.05, transparent: false, opacity: 1, emissiveIntensity: 0 },
      glass: { roughness: 0.1, metalness: 0.0, transparent: true, opacity: 0.45, emissiveIntensity: 0 },
      neon: { roughness: 0.4, metalness: 0.0, transparent: false, opacity: 1, emissiveIntensity: 1.4 },
      glow: { roughness: 0.4, metalness: 0.0, transparent: false, opacity: 1, emissiveIntensity: 0.9 },
    };

    function makeMaterial(baseColor, itemDef, materialOverride) {
      let preset = MATERIAL_PRESETS.default;
      if (materialOverride && MATERIAL_PRESETS[materialOverride]) preset = MATERIAL_PRESETS[materialOverride];
      else if (itemDef && itemDef.metal) preset = MATERIAL_PRESETS.metal;
      else if (itemDef && itemDef.glass) preset = MATERIAL_PRESETS.glass;
      const mat = new THREE.MeshStandardMaterial({
        color: baseColor, roughness: preset.roughness, metalness: preset.metalness,
        transparent: preset.transparent, opacity: preset.opacity, side: THREE.DoubleSide
      });
      if (preset.emissiveIntensity > 0) {
        mat.emissive = new THREE.Color(baseColor);
        mat.emissiveIntensity = preset.emissiveIntensity;
      }
      return mat;
    }

    function buildShapeGroup(shape, color, itemDef, materialOverride) {
      const g = new THREE.Group();
      const mat = () => makeMaterial(color, itemDef, materialOverride);
      let mesh;
      switch (shape) {
        case 'flatbox':
          mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 0.15, 1), mat());
          g.add(mesh); break;
        case 'cylinder':
          mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.8, 14), mat());
          g.add(mesh); break;
        case 'thincyl':
          mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 1, 8), mat());
          g.add(mesh); break;
        case 'sphere':
          mesh = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), mat());
          g.add(mesh); break;
        case 'cone':
          mesh = new THREE.Mesh(new THREE.ConeGeometry(0.4, 0.8, 14), mat());
          g.add(mesh); break;
        case 'torus':
          mesh = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.12, 10, 20), mat());
          g.add(mesh); break;
        case 'wheel': {
          mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.45, 0.25, 20), mat());
          mesh.rotation.z = Math.PI / 2;
          g.add(mesh); break;
        }
        case 'seat': {
          const base = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.35, 0.7), mat());
          base.position.y = 0.17;
          const back = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.55, 0.12), mat());
          back.position.set(0, 0.55, -0.29);
          g.add(base); g.add(back); break;
        }
        case 'engine': {
          const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.55, 0.85), mat());
          body.position.y = 0.28;
          const exhaust = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.13, 0.35, 10), mat());
          exhaust.rotation.z = Math.PI / 2;
          exhaust.position.set(0, 0.28, -0.55);
          g.add(body); g.add(exhaust); break;
        }
        case 'lamp': {
          const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.8, 8), mat());
          pole.position.y = 0.4;
          const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.18, 12, 12), makeMaterial(color, itemDef, materialOverride || 'glow'));
          bulb.position.y = 0.85;
          g.add(pole); g.add(bulb); break;
        }
        case 'flag': {
          const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1.2, 8), makeMaterial(0x999999, null, null));
          pole.position.y = 0.6;
          const cloth = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.3, 0.02), mat());
          cloth.position.set(0.28, 1.05, 0);
          g.add(pole); g.add(cloth); break;
        }
        case 'rocket': {
          const body = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.9, 12), mat());
          body.position.y = 0.45;
          const nose = new THREE.Mesh(new THREE.ConeGeometry(0.22, 0.35, 12), mat());
          nose.position.y = 1.07;
          g.add(body); g.add(nose); break;
        }
        case 'box':
        default:
          mesh = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), mat());
          g.add(mesh); break;
      }
      g.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
      return g;
    }

    function createItemMesh(itemDef, materialOverride, colorOverride) {
      const color = colorOverride != null ? colorOverride : itemDef.color;
      const g = buildShapeGroup(itemDef.shape, color, itemDef, materialOverride);
      g.userData.itemId = itemDef.id;
      return g;
    }

    function applyBlockVisuals(entry) {
      const itemDef = ITEM_BY_ID[entry.itemId];
      if (!itemDef) return;
      entry.mesh.traverse(c => {
        if (c.isMesh) {
          const preset = entry.materialOverride && MATERIAL_PRESETS[entry.materialOverride] ? MATERIAL_PRESETS[entry.materialOverride] : null;
          c.material.opacity = entry.transparency != null ? entry.transparency : 1;
          c.material.transparent = c.material.opacity < 1 || (preset && preset.transparent);
          if (entry.colorOverride != null) c.material.color.set(entry.colorOverride);
        }
      });
    }

    function buyItem(it) {
      if (it.tool && Game.ownedTools[it.id]) { showToast(it.name + ' already owned', 'warn'); return; }
      if (Game.money < it.price) { showToast('Not enough money for ' + it.name, 'warn'); playSfx('error'); return; }
      Game.money -= it.price;
      if (it.tool) Game.ownedTools[it.id] = true;
      else Game.inventory[it.id] = (Game.inventory[it.id] || 0) + 1;

    // --- Raycasting for canvas taps (build/delete/move/paint/tools targets) ---
    const raycaster = new THREE.Raycaster();
    const pointerNDC = new THREE.Vector2();
    let pointerDownInfo = null;

    function setPointerFromEvent(clientX, clientY) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointerNDC.x = ((clientX - rect.left) / rect.width) * 2 - 1;
      pointerNDC.y = -((clientY - rect.top) / rect.height) * 2 + 1;
    }

function raycastGroundPoint() {
  raycaster.setFromCamera(pointerNDC, camera);
  
  const allObjects = [ground];
  Game.placedBlocks.forEach(b => {
    if (b.mesh) allObjects.push(b.mesh);
  });
  
  const hits = raycaster.intersectObjects(allObjects, true);
  if (hits.length > 0) {
    const hit = hits[0];
    const point = hit.point.clone();
    
    // Check if it's a block
    let isBlock = false;
    let blockY = 0;
    Game.placedBlocks.forEach(b => {
      if (b.mesh === hit.object || b.mesh.children?.includes(hit.object)) {
        isBlock = true;
        blockY = b.mesh.position.y;
      }
    });
    
    if (isBlock) {
      // Place on TOP of the block with NO gap
      // Block height is 0.7, so top surface is at blockY + 0.35
      // New block center should be at top surface + 0.35 = blockY + 0.70
      point.y = Math.round((blockY + 0.70) / 0.5) * 0.5;
    } else {
      // Place on ground (center at 0.35)
      point.y = 0.35;
    }
    
    // Snap X and Z to grid
    point.x = Math.round(point.x / 0.5) * 0.5;
    point.z = Math.round(point.z / 0.5) * 0.5;
    
    return point;
  }
  return null;
}

    function raycastPlacedBlock() {
      raycaster.setFromCamera(pointerNDC, camera);
      const meshes = Game.placedBlocks.map(b => b.mesh);
      const hits = raycaster.intersectObjects(meshes, true);
if (hits.length === 0) return null;
      let obj = hits[0].object;
      while (obj && !obj.userData.itemId && obj.parent) obj = obj.parent;
      return Game.placedBlocks.find(b => b.mesh === obj) || null;
    }

    function snapVal(v, step) { return Math.round(v / step) * step; }
// Add a new function for 3D position snapping
function snapPosition(pos) {
  pos.x = Math.round(pos.x / 0.5) * 0.5;
  pos.y = Math.round(pos.y / 0.5) * 0.5;
  pos.z = Math.round(pos.z / 0.5) * 0.5;
  return pos;
}

    renderer.domElement.addEventListener('pointerdown', (e) => {
      pointerDownInfo = { x: e.clientX, y: e.clientY, t: performance.now() };
    });
    renderer.domElement.addEventListener('pointermove', (e) => {
      if (Game.mode === 'build' && Game.selectedItemId && Game.previewMesh) {
        setPointerFromEvent(e.clientX, e.clientY);
        const pt = raycastGroundPoint();
        if (pt) {
  // Use the exact point with proper Y calculation
  Game.previewMesh.position.set(pt.x, pt.y, pt.z);
}
      }
    });
    renderer.domElement.addEventListener('pointerup', (e) => {
      if (!pointerDownInfo) return;
      const dx = e.clientX - pointerDownInfo.x, dy = e.clientY - pointerDownInfo.y;
      const dt = performance.now() - pointerDownInfo.t;
      pointerDownInfo = null;
      if (Math.sqrt(dx*dx+dy*dy) > 10 || dt > 400) return; // was a drag/orbit, not a tap
      setPointerFromEvent(e.clientX, e.clientY);
      handleCanvasTap();
    });

    function handleCanvasTap() {
      if (Game.mode === 'delete') {
        const b = raycastPlacedBlock();
        if (b) deleteBlock(b);
      } else if (Game.mode === 'move') {
        if (!Game.moveArmed) {
          const b = raycastPlacedBlock();
          if (b) { Game.selectedBlock = b; Game.moveArmed = true; highlightBlock(b, true); showToast('Now tap the new spot', 'success'); }
        } else {
          const pt = raycastGroundPoint();
          if (pt && Game.selectedBlock) {
            const b = Game.selectedBlock;
            const before = b.mesh.position.clone();
            b.mesh.position.set(snapVal(pt.x,0.5), b.mesh.position.y, snapVal(pt.z,0.5));
            Game.undoStack.push({ type:'move', uid:b.uid, before, after:b.mesh.position.clone() });
            Game.redoStack = [];
            highlightBlock(b, false);
            Game.selectedBlock = null; Game.moveArmed = false;
            showToast('Moved!', 'success'); playSfx('place');
          }
        }
      } else if (Game.mode === 'paint') {
        const b = raycastPlacedBlock();
        if (b) { Game.selectedBlock = b; showToast('Block selected — choose a color/material', 'success'); }
      } else if (Game.mode === 'tools' && Game.toolboxSub) {
        const b = raycastPlacedBlock();
        if (b) selectBlockForTool(b);
      }
    }

    function rotatePreviewOrBlock(target) {

    function placeBlock() {
      if (!Game.selectedItemId || !Game.previewMesh) { showToast('Select an item first', 'warn'); return; }
      const itemDef = ITEM_BY_ID[Game.selectedItemId];
      const qty = Game.inventory[Game.selectedItemId] || 0;
      if (qty <= 0) { showToast('Out of ' + itemDef.name, 'warn'); cancelBuildPreview(); return; }
      const mesh = createItemMesh(itemDef);
mesh.position.copy(Game.previewMesh.position);
mesh.rotation.copy(Game.previewMesh.rotation);
mesh.scale.copy(Game.previewMesh.scale);
      const entry = {
        uid: Game.uidCounter++, itemId: itemDef.id, mesh,
        anchored: Game.previewAnchored, motorSpeed: 0, motorDir: 1,
        transparency: 1, mass: 5, collision: true, colorOverride: null, materialOverride: null,
        vy: 0, resting: entry_resting(Game.previewAnchored)
      };
      if (entry.anchored) boatGroup.add(mesh); else scene.add(mesh);
      Game.placedBlocks.push(entry);
      Game.inventory[Game.selectedItemId] = qty - 1;
      Game.undoStack.push({ type: 'place', uid: entry.uid });
      Game.redoStack = [];
      showToast('Placed ' + itemDef.name, 'success'); playSfx('place');
      if (Game.inventory[Game.selectedItemId] <= 0) {
        showToast('Out of ' + itemDef.name, 'warn');
        cancelBuildPreview();
      } else {
        Game.previewMesh.position.z -= 0.001; // nudge to keep preview visually distinct after placing
      }
    }
    function entry_resting(anchored) { return anchored ? true : false; }

    function removePlacedEntry(entry) {
      if (entry.mesh.parent) entry.mesh.parent.remove(entry.mesh);
      const idx = Game.placedBlocks.indexOf(entry);
      if (idx >= 0) Game.placedBlocks.splice(idx, 1);
    }

    function deleteBlock(entry) {
      Game.inventory[entry.itemId] = (Game.inventory[entry.itemId] || 0) + 1;
      const serialized = {
        itemId: entry.itemId, anchored: entry.anchored,
        px: entry.mesh.position.x, py: entry.mesh.position.y, pz: entry.mesh.position.z,
        ry: entry.mesh.rotation.y, sx: entry.mesh.scale.x, sy: entry.mesh.scale.y, sz: entry.mesh.scale.z,
        motorSpeed: entry.motorSpeed, motorDir: entry.motorDir, transparency: entry.transparency,
        mass: entry.mass, collision: entry.collision, colorOverride: entry.colorOverride, materialOverride: entry.materialOverride
      };
      removePlacedEntry(entry);
      Game.undoStack.push({ type: 'delete', data: serialized });
      Game.redoStack = [];
      showToast('Deleted block, returned to inventory', 'success'); playSfx('delete');
    }

    function reinstateBlock(data) {
      const itemDef = ITEM_BY_ID[data.itemId];
      if (!itemDef) return null;
      const mesh = createItemMesh(itemDef, data.materialOverride, data.colorOverride);
      mesh.position.set(data.px, data.py, data.pz);
      mesh.rotation.y = data.ry || 0;
      mesh.scale.set(data.sx || 1, data.sy || 1, data.sz || 1);
      const entry = {
        uid: Game.uidCounter++, itemId: data.itemId, mesh, anchored: data.anchored !== false,
        motorSpeed: data.motorSpeed || 0, motorDir: data.motorDir || 1,
        transparency: data.transparency != null ? data.transparency : 1, mass: data.mass || 5,
        collision: data.collision !== false, colorOverride: data.colorOverride || null,
        materialOverride: data.materialOverride || null, vy: 0, resting: entry_resting(data.anchored !== false)
      };
      applyBlockVisuals(entry);
      if (entry.anchored) boatGroup.add(mesh); else scene.add(mesh);
      Game.placedBlocks.push(entry);
      return entry;
    }

    function doUndo() {
      const action = Game.undoStack.pop();
      if (!action) { showToast('Nothing to undo', 'warn'); return; }
      if (action.type === 'place') {
        const entry = Game.placedBlocks.find(b => b.uid === action.uid);
        if (entry) {
          Game.inventory[entry.itemId] = (Game.inventory[entry.itemId] || 0) + 1;
          removePlacedEntry(entry);
        }
      } else if (action.type === 'delete') {
        Game.inventory[action.data.itemId] = Math.max(0, (Game.inventory[action.data.itemId] || 0) - 1);
        reinstateBlock(action.data);
      } else if (action.type === 'move') {
        const entry = Game.placedBlocks.find(b => b.uid === action.uid);
        if (entry) entry.mesh.position.copy(action.before);
      }
      Game.redoStack.push(action);
      renderInvGrid();
      showToast('Undo', 'success');
    }
    function doRedo() {
      const action = Game.redoStack.pop();
      if (!action) { showToast('Nothing to redo', 'warn'); return; }
      if (action.type === 'place') {
        showToast('Redo place not supported for removed items', 'warn');
      } else if (action.type === 'delete') {
        const entry = Game.placedBlocks.find(b => b.itemId === action.data.itemId && Math.abs(b.mesh.position.x-action.data.px)<0.01 && Math.abs(b.mesh.position.z-action.data.pz)<0.01);
        if (entry) { Game.inventory[entry.itemId] = (Game.inventory[entry.itemId]||0)+1; removePlacedEntry(entry); }
      } else if (action.type === 'move') {
        const entry = Game.placedBlocks.find(b => b.uid === action.uid);
        if (entry) entry.mesh.position.copy(action.after);
      }
      Game.undoStack.push(action);
      renderInvGrid();
      showToast('Redo', 'success');
    }

    // --- Paint ---
    const PAINT_COLORS = [0xffffff,0x000000,0xff4444,0xff9933,0xffe066,0x66dd66,0x4488ff,0x9955ee,0xff66cc,0x996633,0x888888,0x66ffff];
    function renderPaintSwatches() {
      const wrap = el('paint-swatches'); wrap.innerHTML = '';
      PAINT_COLORS.forEach(c => {
        const sw = document.createElement('div');
        sw.className = 'color-swatch';

    function applyPaint(color) {
      if (!Game.selectedBlock) { showToast('Tap a block first', 'warn'); return; }
      const material = el('paint-material').value;
      const entry = Game.selectedBlock;
      entry.colorOverride = color;
      entry.materialOverride = material === 'default' ? null : material;
      entry.mesh.traverse(c => {
        if (c.isMesh) {
          const preset = entry.materialOverride ? MATERIAL_PRESETS[entry.materialOverride] : MATERIAL_PRESETS.default;
          c.material.color.set(color);
          c.material.roughness = preset.roughness; c.material.metalness = preset.metalness;
          c.material.transparent = preset.transparent || entry.transparency < 1;
          c.material.opacity = preset.transparent ? preset.opacity : entry.transparency;
          if (preset.emissiveIntensity > 0) { c.material.emissive = new THREE.Color(color); c.material.emissiveIntensity = preset.emissiveIntensity; }
          else { c.material.emissive = new THREE.Color(0x000000); c.material.emissiveIntensity = 0; }
        }
      });
      showToast('Painted!', 'success'); playSfx('click');
    }

      el('hammer-collision-toggle').textContent = Game.selectedBlock.collision ? 'ON' : 'OFF';
    });

    // --- More dropdown ---
    const undoBtn = document.createElement('button');
    undoBtn.className = 'pill-btn pill-gray'; undoBtn.setAttribute('data-action','undo'); undoBtn.textContent = '↩ Undo';
    const redoBtn = document.createElement('button');
    redoBtn.className = 'pill-btn pill-gray'; redoBtn.setAttribute('data-action','redo'); redoBtn.textContent = '↪ Redo';
    el('more-dropdown').appendChild(undoBtn);
    el('more-dropdown').appendChild(redoBtn);



    el('more-btn').addEventListener('click', (e) => { e.stopPropagation(); el('more-dropdown').classList.toggle('open'); playSfx('click'); });
    window.addEventListener('click', (e) => {
      if (!el('more-dropdown').contains(e.target) && e.target !== el('more-btn')) el('more-dropdown').classList.remove('open');
    });
    document.querySelectorAll('#more-dropdown [data-action]').forEach(btn => {
      btn.addEventListener('click', () => { handleMoreAction(btn.getAttribute('data-action')); el('more-dropdown').classList.remove('open'); });
    });

    function handleMoreAction(action) {
      if (action === 'quests') { renderQuests(); openOverlay('quests-overlay'); }
      else if (action === 'settings') { renderSettings(); openOverlay('settings-overlay'); }
      else if (action === 'save') { saveGame(true); }
      else if (action === 'load') { loadGame(true); refreshMoneyUI(); renderShopGrid(); renderInvGrid(); applySettingsToEngine(); }
      else if (action === 'controls') { renderControls(); openOverlay('controls-overlay'); }

      else if (action === 'respawn') { respawnPlayer(false); }
      else if (action === 'undo') { doUndo(); }
      else if (action === 'redo') { doRedo(); }
    }

    function renderQuests() {
      el('quests-body').innerHTML = `
        <div style="font-size:12px;color:#aaa;margin-bottom:10px;">Preview — the full quest &amp; reward system is coming in a future update.</div>
        <div class="more-list">
          <div class="settings-row"><label>🧭 Travel 500m from spawn</label><span>Coming soon</span></div>

    }
    function renderControls() {
      el('controls-body').innerHTML = `
        <div class="more-list" style="gap:12px;font-size:13px;line-height:1.5;">
          <div>🕹️ <b>Joystick</b> (bottom-left) — walk around, or steer your boat once seated.</div>
          <div>⭕ <b>Jump</b> (bottom-right) — jump on foot, or exit the Driver Seat while sailing.</div>
          <div>🖱️ <b>Drag the screen</b> — orbit the camera. Pinch or scroll to zoom.</div>
          <div>🧱 <b>Build</b> — pick an item from Inventory, tap the ground to position it, then Place.</div>
          <div>🗑️ <b>Delete</b> — tap a placed block to remove it and return it to Inventory.</div>

    function renderCredits() {
      el('credits-body').innerHTML = `
        <div style="line-height:1.6;font-size:13px;">
          Built with Three.js.<br>
          Inspired by Roblox's Build A Boat For Treasure.<br><br>

    // --- Settings ---
    function renderSettings() {
      const body = el('settings-body');
      body.innerHTML = `
        <div class="settings-row"><label>Graphics Quality</label>
          <select id="set-graphics" class="mat-select">
            <option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option>
          </select></div>
        <div class="settings-row"><label>Music Volume</label><input type="range" id="set-music" min="0" max="1" step="0.05"></div>
        <div class="settings-row"><label>SFX Volume</label><input type="range" id="set-sfx" min="0" max="1" step="0.05"></div>
        <div class="settings-row"><label>Shadows</label><button class="pill-btn pill-gray" id="set-shadows" style="padding:6px 10px;font-size:11px;"></button></div>
        <div class="settings-row"><label>Render Distance</label><input type="range" id="set-render" min="40" max="300" step="10"></div>
        <div class="settings-row"><label>Joystick Size</label><input type="range" id="set-joystick" min="90" max="200" step="5"></div>
        <div class="settings-row"><label>Camera Sensitivity</label><input type="range" id="set-camsens" min="0.3" max="2.5" step="0.1"></div>
        <button class="pill-btn pill-red" id="set-reset" style="margin-top:10px;width:100%;padding:10px;">Reset Settings</button>
      `;
      el('set-graphics').value = Game.settings.graphics;
      el('set-music').value = Game.settings.musicVolume;
      el('set-sfx').value = Game.settings.sfxVolume;
      el('set-shadows').textContent = Game.settings.shadows ? 'ON' : 'OFF';
      el('set-render').value = Game.settings.renderDistance;
      el('set-joystick').value = Game.settings.joystickSize;
      el('set-camsens').value = Game.settings.camSensitivity;

      el('set-graphics').addEventListener('change', () => { Game.settings.graphics = el('set-graphics').value; applySettingsToEngine(); saveGame(false); });
      el('set-music').addEventListener('input', () => { Game.settings.musicVolume = parseFloat(el('set-music').value); applySettingsToEngine(); });
      el('set-sfx').addEventListener('input', () => { Game.settings.sfxVolume = parseFloat(el('set-sfx').value); });
      el('set-shadows').addEventListener('click', () => { Game.settings.shadows = !Game.settings.shadows; el('set-shadows').textContent = Game.settings.shadows ? 'ON' : 'OFF'; applySettingsToEngine(); });
      el('set-render').addEventListener('input', () => { Game.settings.renderDistance = parseFloat(el('set-render').value); applySettingsToEngine(); });
      el('set-joystick').addEventListener('input', () => { Game.settings.joystickSize = parseFloat(el('set-joystick').value); applySettingsToEngine(); });
      el('set-camsens').addEventListener('input', () => { Game.settings.camSensitivity = parseFloat(el('set-camsens').value); applySettingsToEngine(); });
      el('set-reset').addEventListener('click', () => { Game.settings = Object.assign({}, DEFAULT_SETTINGS); renderSettings(); applySettingsToEngine(); showToast('Settings reset', 'success'); });
    }

    function applySettingsToEngine() {
      const q = Game.settings.graphics;
      let pr = 1, mapSize = 1024;
      if (q === 'low') { pr = 1; mapSize = 512; }
      else if (q === 'medium') { pr = Math.min(window.devicePixelRatio, 1.5); mapSize = 1024; }
      else { pr = Math.min(window.devicePixelRatio, 2); mapSize = 2048; }
      renderer.setPixelRatio(pr);
      if (dirLight.shadow.mapSize.width !== mapSize) {
        dirLight.shadow.mapSize.set(mapSize, mapSize);
        if (dirLight.shadow.map) { dirLight.shadow.map.dispose(); dirLight.shadow.map = null; }
      }
      renderer.shadowMap.enabled = Game.settings.shadows;
      dirLight.castShadow = Game.settings.shadows;
      camera.far = Math.max(60, Game.settings.renderDistance * 3);
      camera.updateProjectionMatrix();
      if (!scene.fog) scene.fog = new THREE.Fog(0x87CEEB, Game.settings.renderDistance * 0.4, Game.settings.renderDistance);
      else { scene.fog.color.set(0x87CEEB); scene.fog.near = Game.settings.renderDistance * 0.4; scene.fog.far = Game.settings.renderDistance; }
      document.documentElement.style.setProperty('--joy-size', Game.settings.joystickSize + 'px');
      controls.rotateSpeed = 0.8 * Game.settings.camSensitivity;
      controls.zoomSpeed = 1.2 * Game.settings.camSensitivity;
      if (musicGain) musicGain.gain.value = Game.settings.musicVolume * 0.06;
    }

    // --- Launch / Dock ---
    function showWarningBanner(msg) {
      const b = el('warning-banner');
      b.textContent = msg;
      b.style.display = 'block';
      clearTimeout(b.__t);
      b.__t = setTimeout(() => { b.style.display = 'none'; }, 3000);
    }
    function attemptLaunch() {
  if (Game.hasLaunched) { dockBoat(); return; }
  const hasSeat = Game.placedBlocks.some(b => b.anchored && b.itemId === 'driver_seat');
  const hasEngine = Game.placedBlocks.some(b => b.anchored && b.itemId === 'boat_engine');
  if (!hasSeat || !hasEngine) {
    showWarningBanner('You need a Driver Seat AND a Boat Engine anchored to your boat to launch!');
    playSfx('error');
    return;
  }
  Game.hasLaunched = true;
  ground.visible = false;
  waterMesh.visible = true;
  generateObstacles(); // ADD THIS LINE
  Game.launchGraceTimer = 1.5;
  el('launch-btn').textContent = '⚓ DOCK';
  showToast('Setting sail!', 'success'); playSfx('launch');
}
function dockBoat() {
  Game.hasLaunched = false;
  ground.visible = true;
  waterMesh.visible = false;
  el('launch-btn').textContent = '🚤 LAUNCH';
  // Reset distance tracking
  distanceTraveled = 0;
  lastMoneyEarn = 0;
  lastPosForDistance.x = 0;
  lastPosForDistance.z = 0;
  // Clear obstacles
  obstacles.forEach(o => scene.remove(o.group));
  obstacles.length = 0;
  showToast('Boat docked', 'success');
}
    el('launch-btn').addEventListener('click', attemptLaunch);

    // --- Reset boat / respawn ---
    function resetBoat() {
      clearBoat(true);
      boatGroup.position.set(boatSpawnTransform.x, boatSpawnTransform.y, boatSpawnTransform.z);
      boatGroup.rotation.y = boatSpawnTransform.rotY;
      dockBoat();
      renderInvGrid();
      showToast('Boat reset — items returned to Inventory', 'success');
    }
    function respawnPlayer(isDrowned) {
      if (Game.isSeated) exitSeatSilently();
      playerGroup.position.set(0, 0.4, 0);
      isJumping = false; jumpVelocity = 0;
      if (isDrowned) showToast('You drowned! Respawned at spawn.', 'warn');
      else showToast('Respawned', 'success');
    }
    function exitSeatSilently() { Game.isSeated = false; playerGroup.visible = true; Game.seatBlock = null; }

    // --- Driver seat ---
    function enterSeat(entry) {
      Game.isSeated = true; Game.seatBlock = entry; playerGroup.visible = false;
      showToast('Seated — use the joystick to steer', 'success');
    }
    function exitSeat() {
      if (!Game.seatBlock) { Game.isSeated = false; playerGroup.visible = true; return; }
      const worldPos = new THREE.Vector3(); Game.seatBlock.mesh.getWorldPosition(worldPos);
      playerGroup.position.set(worldPos.x + 1, 0.4, worldPos.z);
      playerGroup.visible = true;
      Game.isSeated = false; Game.seatBlock = null;
      showToast('Exited seat', 'success');
    }
    function updateDriverSeatAutoSit() {
      if (Game.isSeated) return;
      for (const b of Game.placedBlocks) {
        if (b.itemId === 'driver_seat') {
          const wp = new THREE.Vector3(); b.mesh.getWorldPosition(wp);
          const dist = Math.sqrt(Math.pow(wp.x - playerGroup.position.x, 2) + Math.pow(wp.z - playerGroup.position.z, 2));
          if (dist < 1.0 && Math.abs(wp.y - playerGroup.position.y) < 1.2) { enterSeat(b); return; }
        }
      }
    }
    function updateBoatDriving(delta) {
      if (!Game.isSeated) return;
      const speed = 4.0, turnSpeed = 1.4;
      if (Math.abs(joystickSmooth.y) > 0.01) {
        const forward = new THREE.Vector3(Math.sin(boatGroup.rotation.y), 0, Math.cos(boatGroup.rotation.y));
        boatGroup.position.addScaledVector(forward, -joystickSmooth.y * speed * delta);
      }
      if (Math.abs(joystickSmooth.x) > 0.01) {
        boatGroup.rotation.y -= joystickSmooth.x * turnSpeed * delta;
      }
      if (Game.hasLaunched) boatGroup.position.y = Math.sin(performance.now() * 0.001) * 0.05;
      else boatGroup.position.y = boatSpawnTransform.y;
    }

    // --- Drowning ---
    function updateDrowning(delta) {
      if (!Game.hasLaunched) return;
      if (Game.launchGraceTimer > 0) { Game.launchGraceTimer -= delta; return; }
      if (Game.isSeated) return;
      const origin = new THREE.Vector3(playerGroup.position.x, playerGroup.position.y + 1.0, playerGroup.position.z);
      raycaster.set(origin, new THREE.Vector3(0, -1, 0));
      const hits = raycaster.intersectObject(boatGroup, true);
      const onBoat = hits.length > 0 && hits[0].distance < 1.3;
      if (!onBoat && playerGroup.position.y <= 0.42) drownPlayer();
    }
function checkObstacleCollision() {
  const boatPos = boatGroup.position;
  const boatRadius = 0.5; // Much smaller
  
  for (const obs of obstacles) {
    const dx = boatPos.x - obs.x;
    const dz = boatPos.z - obs.z;
    const dist = Math.sqrt(dx*dx + dz*dz);
    
    // Only detect if actually overlapping (not just near)
    if (dist < boatRadius + obs.radius) {
      // Push boat back
      const angle = Math.atan2(dz, dx);
      boatPos.x += Math.cos(angle) * 0.1;
      boatPos.z += Math.sin(angle) * 0.1;
      
      if (!Game._lastObstacleWarning || Date.now() - Game._lastObstacleWarning > 2000) {
        Game._lastObstacleWarning = Date.now();
        showWarningBanner('💥 Hit an obstacle!');
        playSfx('error');
      }
      return true;
    }
  }
  return false;
}
    function drownPlayer() {
      boatGroup.position.set(boatSpawnTransform.x, boatSpawnTransform.y, boatSpawnTransform.z);
      boatGroup.rotation.y = boatSpawnTransform.rotY;
      ground.visible = true; waterMesh.visible = false;
      Game.hasLaunched = false;
      el('launch-btn').textContent = '🚤 LAUNCH';
      respawnPlayer(true);
      playSfx('splash');
    }

    // --- Portals ---
    function updatePortalTeleport(delta) {
      if (Game.isSeated) return;
      if (Game.portalCooldown > 0) { Game.portalCooldown -= delta; return; }
      const portals = Game.placedBlocks.filter(b => b.itemId === 'portal');
      for (const p of portals) {
        const wp = new THREE.Vector3(); p.mesh.getWorldPosition(wp);
        const dist = Math.sqrt(Math.pow(wp.x - playerGroup.position.x, 2) + Math.pow(wp.z - playerGroup.position.z, 2));
        if (dist < 0.8) {
          const myColor = p.colorOverride != null ? p.colorOverride : ITEM_BY_ID['portal'].color;
          const partner = portals.find(o => o !== p && (o.colorOverride != null ? o.colorOverride : ITEM_BY_ID['portal'].color) === myColor);
          if (partner) {
            const targetPos = new THREE.Vector3(); partner.mesh.getWorldPosition(targetPos);
            playerGroup.position.set(targetPos.x, playerGroup.position.y, targetPos.z + 1);
            Game.portalCooldown = 1.2;
            showToast('Whoosh!', 'success'); playSfx('portal');
          }
          break;
        }
      }
    }

    // --- Motors & loose-item physics ---
    function updateMotors(delta) {
      for (const b of Game.placedBlocks) {
        if (b.motorSpeed && Math.abs(b.motorSpeed) > 0.001) {
          const def = ITEM_BY_ID[b.itemId];
          if (def && def.shape === 'wheel') b.mesh.rotation.z += b.motorSpeed * b.motorDir * delta * 2;
          else b.mesh.rotation.y += b.motorSpeed * b.motorDir * delta * 2;
        }
        if (b.materialOverride === 'glow') {
          b.mesh.traverse(c => {
            if (c.isMesh && c.material.emissiveIntensity !== undefined) {
              c.material.emissiveIntensity = 0.6 + Math.sin(performance.now() * 0.004 + (b.uid || 0)) * 0.4;
            }
          });
        }
      }
    }
    function updateLooseItemPhysics(delta) {
      const ITEM_GRAVITY = -9.8;
      for (const b of Game.placedBlocks) {
        if (!b.anchored && !b.resting) {
          b.vy = (b.vy || 0) + ITEM_GRAVITY * delta * (0.5 + (b.mass || 5) / 20);
          b.mesh.position.y += b.vy * delta;
          const floorY = (Game.hasLaunched && waterMesh.visible) ? 0.05 : 0.02;
          if (b.mesh.position.y <= floorY) { b.mesh.position.y = floorY; b.vy = 0; b.resting = true; }
        }
      }
    }

    // --- FPS counter ---
    let fpsFrames = 0, fpsLastTime = performance.now();
    function updateFPSCounter(time) {
      fpsFrames++;
      if (time - fpsLastTime >= 500) {
        fpsAmt.textContent = Math.round((fpsFrames * 1000) / (time - fpsLastTime));
        fpsFrames = 0; fpsLastTime = time;
      }
    }

    // --- Autosave ---
    setInterval(() => saveGame(false), 20000);
    window.addEventListener('beforeunload', () => saveGame(false));

    // --- Game loop (extends the original loop: seated/boat branch, plus new systems) ---
    let prevTime = performance.now();
    const forward = new THREE.Vector3();
    const right = new THREE.Vector3();

    function animate(time) {
      const delta = Math.min((time - prevTime) / 1000, 0.05);
      prevTime = time;

      // 1. Jump physics
      if (isJumping) {
        jumpVelocity += GRAVITY * delta;
        playerGroup.position.y += jumpVelocity * delta;
        if (playerGroup.position.y <= 0.4) {
          playerGroup.position.y = 0.4;
          isJumping = false;
          jumpVelocity = 0;
        }
      } else if (!Game.isSeated) {
        playerGroup.position.y = 0.4;
      }

      // 2. Smooth joystick interpolation
      const smoothSpeed = 10.0;
      joystickSmooth.x += (joystickData.x - joystickSmooth.x) * Math.min(1, smoothSpeed * delta);
      joystickSmooth.y += (joystickData.y - joystickSmooth.y) * Math.min(1, smoothSpeed * delta);

      // 3. Camera-relative movement OR boat driving if seated
      if (Game.isSeated) {
        updateBoatDriving(delta);
        if (Game.seatBlock) {
          const seatWorldPos = new THREE.Vector3();
          Game.seatBlock.mesh.getWorldPosition(seatWorldPos);
          playerGroup.position.set(seatWorldPos.x, seatWorldPos.y + 0.5, seatWorldPos.z);
        }
      } else if (Math.abs(joystickSmooth.x) > 0.01 || Math.abs(joystickSmooth.y) > 0.01) {
        // Get camera direction but ignore vertical angle
        forward.set(
          -Math.sin(controls.getAzimuthalAngle()),
          0,
          -Math.cos(controls.getAzimuthalAngle())
        ).normalize();

        right.crossVectors(new THREE.Vector3(0, 1, 0), forward).normalize();
        right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

        const speed = 6.0;
        const moveVec = new THREE.Vector3();
        moveVec.addScaledVector(forward, -joystickSmooth.y * speed * delta);
        moveVec.addScaledVector(right, joystickSmooth.x * speed * delta);

        // Only move on XZ plane (keep Y constant)
        playerGroup.position.x += moveVec.x;
        playerGroup.position.z += moveVec.z;

        if (moveVec.length() > 0.001) {
          const angle = Math.atan2(moveVec.x, moveVec.z);
          let targetAngle = angle;
          let currentAngle = playerGroup.rotation.y;
          let diff = targetAngle - currentAngle;
          while (diff > Math.PI) diff -= Math.PI * 2;
          while (diff < -Math.PI) diff += Math.PI * 2;
          playerGroup.rotation.y += diff * Math.min(1, 12 * delta);
        }
      }

      // Update shadow
      shadowDisc.position.x = playerGroup.position.x;
      shadowDisc.position.z = playerGroup.position.z;

      controls.target.set(
        playerGroup.position.x,
        playerGroup.position.y + 1.57,
        playerGroup.position.z
      );
      controls.update();

      const distance = camera.position.distanceTo(controls.target);
      // Make player transparent when zoomed in close
      const transparencyDistance = 2.5;
      let opacity = 1.0;
      if (distance < transparencyDistance) {
        opacity = Math.max(0, distance / transparencyDistance - 0.5);
      }

      // Apply transparency to all meshes in the player
      playerGroup.traverse((child) => {
        if (child.isMesh && child.material) {
          child.material.opacity = opacity;
          child.material.transparent = true;
          child.material.depthWrite = opacity > 0.95;
          child.renderOrder = 1;
        }
        const newTarget = new THREE.Vector3(
          playerGroup.position.x,
          playerGroup.position.y + 1.57,
          playerGroup.position.z
        );

        const deltaTarget = newTarget.clone().sub(lastTarget);

        camera.position.add(deltaTarget);
        controls.target.copy(newTarget);
        lastTarget.copy(newTarget);

        controls.update();
      });

      // ---- New Phase 1 systems ----
      updateMotors(delta);
      updateLooseItemPhysics(delta);
      updatePortalTeleport(delta);
      if (!Game.isSeated) updateDriverSeatAutoSit();
      updateDrowning(delta);
      if (waterMesh.visible) {
        waterMesh.position.x = playerGroup.position.x;
        waterMesh.position.z = playerGroup.position.z;
        const waterMat = waterMesh.material;
        // Water stays still
// Water moves opposite to boat's facing direction
if (waterMat.map && Game.hasLaunched && Game.isSeated) {
  const dirX = -Math.sin(boatGroup.rotation.y);
  const dirZ = -Math.cos(boatGroup.rotation.y);
  waterMat.map.offset.x += dirX * 0.001;
  waterMat.map.offset.y += dirZ * 0.001;
}
      }
      updateFPSCounter(time);
      
      
// Switch between idle and walk models
if (walkModel && !Game.isSeated) {
  const isMoving = Math.abs(joystickSmooth.x) > 0.1 || Math.abs(joystickSmooth.y) > 0.1;
  
  if (isMoving && !isWalkingAnimation) {
    // Switch to walk model
    playerGroup.visible = false;
    walkModel.visible = true;
    walkModel.position.copy(playerGroup.position);
    walkModel.rotation.y = playerGroup.rotation.y; // Only copy Y rotation
    isWalkingAnimation = true;
  } else if (!isMoving && isWalkingAnimation) {
    // Switch back to player model
    playerGroup.visible = true;
    walkModel.visible = false;
    isWalkingAnimation = false;
  }
  
  // Sync positions when walking
  if (isWalkingAnimation) {
    walkModel.position.copy(playerGroup.position);
    walkModel.rotation.y = playerGroup.rotation.y; // Only copy Y rotation
  }
}
      
      
// Check obstacle collisions
if (Game.hasLaunched) {
  checkObstacleCollision();
}
// Track distance and earn money
if (Game.hasLaunched && Game.isSeated) {
  const dx = boatGroup.position.x - lastPosForDistance.x;
  const dz = boatGroup.position.z - lastPosForDistance.z;
  const dist = Math.sqrt(dx*dx + dz*dz);
  distanceTraveled += dist;
  lastPosForDistance.x = boatGroup.position.x;
  lastPosForDistance.z = boatGroup.position.z;
  
  // Earn money every 10 units of distance
  if (distanceTraveled - lastMoneyEarn >= 10) {
    const earned = Math.floor((distanceTraveled - lastMoneyEarn) / 10) * 5;
    Game.money += earned;
    lastMoneyEarn = Math.floor(distanceTraveled / 10) * 10;
    refreshMoneyUI();
    showToast(`💰 Earned $${earned} for sailing!`, 'success');
    playSfx('buy');
  }
}

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    lastTarget.set(0, 1.97, 0);

    // --- Resize ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.addEventListener('contextmenu', (e) => e.preventDefault());

    // --- Boot sequence ---
    loadGame(false);
    renderShopTabs(); renderShopGrid();
    renderInvTabs(); renderInvGrid();
    refreshMoneyUI();
    applySettingsToEngine();
    dockBoat();

    console.log('Build A Boat · Phase 1 (Shop, Inventory, Build, Sail) Enabled');

    animate(performance.now());
    // Replace emojis with SVG icons
replaceEmojisWithIcons();
  </script>
